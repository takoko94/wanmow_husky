<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>2位 ハスキー</title>

<style>

@font-face{
    font-family:'Panda';
    src:url('pandabakery.ttf');
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100vw;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#cfd8e6;

    overflow:hidden;
}

/* =========================
   1280×720
========================= */

.stage{
    position:relative;

    width:1280px;
    height:720px;

    overflow:hidden;

    border-radius:28px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.18),
        rgba(180,210,255,0.08)
    ),
    url('haikei.png')
    center center / cover no-repeat;

    box-shadow:
    0 30px 70px rgba(0,0,0,0.22);
}

/* オーバーレイ */

.stage::before{
    content:'';

    position:absolute;
    inset:0;

    background:
    radial-gradient(
        circle at top,
        rgba(255,255,255,0.35),
        transparent 55%
    );

    z-index:0;
}

/* =========================
   ロゴ
========================= */

.event-logo{
    position:absolute;

    top:18px;
    right:18px;

    width:320px;

    z-index:8;

    filter:
    drop-shadow(0 10px 24px rgba(0,0,0,0.18));

    animation:
    fadeUp 1s ease;
}

/* =========================
   真ん中
========================= */

.center{
    position:absolute;

    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    z-index:5;

    transform:translateY(-68px);
}

/* 順位 */

.rank{
    font-family:'Panda';

    font-size:92px;

    line-height:1;

    color:#d9ecff;

    -webkit-text-stroke:3px #7aa8d8;

    text-shadow:
    0 0 22px rgba(255,255,255,0.95),
    0 10px 26px rgba(122,168,216,0.45);

    animation:
    glow 2.5s infinite alternate;
}

/* 犬種 */

.name{
    margin-top:12px;

    font-family:'Panda';

    font-size:140px;

    line-height:1;

    color:#ffffff;

    letter-spacing:4px;

    text-shadow:
    0 0 12px rgba(255,255,255,0.95),
    0 0 34px rgba(160,210,255,0.75),
    0 10px 28px rgba(0,0,0,0.18);

    animation:
    fadeUp 1.2s ease;
}

/* =========================
   写真
========================= */

.photo{
    position:absolute;

    width:340px;
    height:430px;

    object-fit:cover;

    background:
    linear-gradient(
        180deg,
        #ffffff,
        #eef6ff
    );

    padding:12px 12px 52px;

    border-radius:18px;

    border:5px solid #d8ecff;

    box-shadow:
    0 20px 50px rgba(90,140,200,0.28);

    z-index:3;
}

/* 左 */

.left{
    left:45px;
    top:155px;

    transform:
    rotate(-6deg);

    animation:
    floatLeft 4s ease-in-out infinite;
}

/* 右 */

.right{
    right:45px;
    top:155px;

    transform:
    rotate(6deg);

    animation:
    floatRight 4s ease-in-out infinite;

    animation-delay:2s;
}

/* テープ */

.tape{
    position:absolute;

    width:110px;
    height:28px;

    background:
    repeating-linear-gradient(
        45deg,
        #dff1ff,
        #dff1ff 8px,
        #ffffff 8px,
        #ffffff 16px
    );

    opacity:0.96;

    border-radius:6px;

    box-shadow:
    0 4px 10px rgba(0,0,0,0.08);

    z-index:6;
}

.tape-left{
    left:150px;
    top:165px;

    transform:
    rotate(-8deg);
}

.tape-right{
    right:150px;
    top:165px;

    transform:
    rotate(8deg);
}

/* =========================
   投票数
========================= */

.vote-box{
    position:absolute;

    left:50%;
    bottom:92px;

    transform:
    translateX(-50%)
    scale(0.95);

    display:flex;
    align-items:center;
    gap:18px;

    padding:
    22px 42px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,0.96),
        rgba(225,240,255,0.96)
    );

    border:
    6px solid #cde7ff;

    border-radius:32px;

    box-shadow:
    0 15px 40px rgba(120,170,230,0.28),
    0 0 35px rgba(255,255,255,0.6);

    z-index:7;
}

/* 投票数 */

.vote-text{
    font-family:'Panda';

    font-size:44px;

    color:#5f7fa3;
}

/* 数字 */

.vote-number{
    font-family:'Panda';

    font-size:92px;

    line-height:1;

    color:#ffffff;

    -webkit-text-stroke:3px #8eb9e8;

    text-shadow:
    0 0 16px rgba(255,255,255,0.95),
    0 0 36px rgba(170,220,255,0.8);
}

/* 票 */

.vote-unit{
    font-family:'Panda';

    font-size:58px;

    color:#5f7fa3;
}

/* =========================
   キラキラ
========================= */

.sparkle{
    position:absolute;

    z-index:1;

    opacity:0.95;

    animation:
    sparkle 3s infinite ease-in-out;
}

/* 星 */

.star{
    width:24px;
    height:24px;

    background:#ffffff;

    clip-path:polygon(
    50% 0%,
    61% 35%,
    98% 35%,
    68% 57%,
    79% 91%,
    50% 70%,
    21% 91%,
    32% 57%,
    2% 35%,
    39% 35%
    );

    box-shadow:
    0 0 18px rgba(255,255,255,0.9);
}

/* ダイヤ */

.diamond{
    width:20px;
    height:20px;

    background:#dff3ff;

    transform:rotate(45deg);

    box-shadow:
    0 0 18px rgba(220,245,255,0.9);
}

/* 配置 */

.s1{
    top:70px;
    left:110px;
}

.s2{
    top:150px;
    left:330px;

    animation-delay:1s;
}

.s3{
    top:110px;
    right:340px;

    animation-delay:2s;
}

.s4{
    bottom:110px;
    left:240px;

    animation-delay:1.5s;
}

.s5{
    bottom:120px;
    right:250px;

    animation-delay:2.5s;
}

.s6{
    top:320px;
    left:530px;

    animation-delay:0.7s;
}

.s7{
    top:320px;
    right:530px;

    animation-delay:1.8s;
}

/* =========================
   アニメーション
========================= */

@keyframes fadeUp{
    from{
        opacity:0;
        transform:
        translateY(24px);
    }

    to{
        opacity:1;
        transform:
        translateY(0);
    }
}

@keyframes sparkle{
    0%{
        transform:
        scale(0.7);

        opacity:0.35;
    }

    50%{
        transform:
        scale(1.35);

        opacity:1;
    }

    100%{
        transform:
        scale(0.7);

        opacity:0.35;
    }
}

@keyframes glow{
    from{
        text-shadow:
        0 0 12px rgba(255,255,255,0.7),
        0 10px 20px rgba(122,168,216,0.25);
    }

    to{
        text-shadow:
        0 0 24px rgba(255,255,255,1),
        0 0 40px rgba(180,225,255,0.9),
        0 12px 28px rgba(122,168,216,0.45);
    }
}

@keyframes floatLeft{
    0%{
        transform:
        rotate(-6deg)
        translateY(0px);
    }

    50%{
        transform:
        rotate(-6deg)
        translateY(-12px);
    }

    100%{
        transform:
        rotate(-6deg)
        translateY(0px);
    }
}

@keyframes floatRight{
    0%{
        transform:
        rotate(6deg)
        translateY(0px);
    }

    50%{
        transform:
        rotate(6deg)
        translateY(-12px);
    }

    100%{
        transform:
        rotate(6deg)
        translateY(0px);
    }
}

</style>
</head>

<body>

<div class="stage">

<!-- キラキラ -->

<div class="sparkle star s1"></div>
<div class="sparkle diamond s2"></div>
<div class="sparkle star s3"></div>

<div class="sparkle diamond s4"></div>
<div class="sparkle star s5"></div>
<div class="sparkle diamond s6"></div>
<div class="sparkle star s7"></div>

<!-- ロゴ -->

<img
src="wan_logo.png"
class="event-logo"
>

<!-- テープ -->

<div class="tape tape-left"></div>
<div class="tape tape-right"></div>

<!-- 写真 -->

<img
src="husky1.png"
class="photo left"
>

<img
src="husky2.png"
class="photo right"
>

<!-- 真ん中 -->

<div class="center">

<div class="rank">
2位
</div>

<div class="name">
ハスキー
</div>

</div>

<!-- 投票数 -->

<div class="vote-box">

<div class="vote-text">
投票数
</div>

<div class="vote-number">
2592
</div>

<div class="vote-unit">
票
</div>

</div>

</div>

</body>
</html>
